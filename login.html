    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Reset Password</h3>
                <span class="close" onclick="closeForgotPasswordModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p>Enter your email address and we'll send you a secure link to reset your password.</p>
                <div class="input-group">
                    <label for="forgotEmail">Email Address</label>
                    <input type="email" id="forgotEmail" placeholder="Enter your email">
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" onclick="closeForgotPasswordModal()">Cancel</button>
                    <button class="btn-primary" onclick="sendResetLink()">Send Reset Link</button>
                </div>
            </div>
        </div>
    </div>


    <!-- Reset Password Modal -->
    <div id="resetPasswordModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Reset Password</h3>
                <span class="close" onclick="closeResetPasswordModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p>Please enter your new password below.</p>
                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password">
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password">
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" onclick="closeResetPasswordModal()">Cancel</button>
                    <button class="btn-primary" onclick="resetPasswordFromModal()">Reset Password</button>
                </div>
            </div>
        </div>
    </div>

    <script src="client.js" defer></script>
    <button id="themeToggleLogin" class="theme-toggle" type="button" aria-label="Toggle theme" style="display:none">🌙</button>
    <script>
      (function(){
        try {
          const root = document.documentElement;
          const btn = document.getElementById('themeToggleLogin');
          // Force light mode on login page, ignore stored/system preference
          root.setAttribute('data-theme', 'light');
          
          // Update logo to light theme (since login is always light mode)
          function updateLogo() {
            const mainLogo = document.getElementById('themeLogo');
            if (mainLogo) mainLogo.src = 'lightlogo-theme.png';
          }
          
          // Set logo to light theme
          updateLogo();
          
          // Hide/disable toggle on login to keep light theme
          if (btn) {
            btn.style.display = 'none';
            btn.disabled = true;
          }
        } catch(_) {}
      })();
    </script>
